<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="ipu.jpg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Student Cell - Premium Login</title>
  
  <!-- Modern Typography (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Editorial Theme Variables */
    :root {
      --font-inter: 'Inter', sans-serif;
      --bg: #F8F5EC;
      --bg-card: #FFFFFF;
      --input-bg: #F1E9D8;
      --border: #E3D8C4;
      --text-main: #1C1A1A;
      --text-muted: #5E544A;
      --primary: #8B1A1A;    /* Maroon */
      --primary-hover: #C8A243; /* Gold */
      --focus-ring: rgba(139, 26, 26, 0.4);
      --danger: #C85555;
      --danger-bg: rgba(200, 85, 85, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-inter);
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Layout & Card */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 2rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 30px rgba(28, 26, 26, 0.05),
                  0 1px 3px rgba(28, 26, 26, 0.03);
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(139, 26, 26, 0.1);
    }
    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .login-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Role Toggles */
    .role-toggle {
      display: flex;
      gap: 0.5rem;
      background: var(--bg);
      padding: 0.35rem;
      border-radius: var(--radius);
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    .role-btn {
      flex: 1;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .role-btn.active {
      background: var(--bg-card);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .role-btn:not(.active):hover {
      color: var(--text-main);
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-main);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.2s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus-ring);
      background: var(--bg-card);
    }
    .form-input::placeholder {
      color: #A39B90;
    }

    /* Password Toggle */
    .pwd-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px; /* Touch target */
      min-height: 44px;
    }
    .pwd-toggle:hover {
      color: var(--primary);
    }
    .pwd-toggle svg {
      width: 20px;
      height: 20px;
    }

    /* Options: Remember & Forgot Password */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 500;
    }
    .remember-me input {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
    .forgot-pwd {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    .forgot-pwd:hover {
      color: var(--primary-hover);
    }

    /* Submit Button */
    .submit-btn { width: 100%; padding: 0.9rem; font-family: inherit; font-size: 15px; font-weight: 600; color: #FFFFFF; background: var(--primary); border: none; border-radius: var(--radius); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; min-height: 48px; }
    .submit-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .submit-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Loading Spinner */
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #FFF; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .submit-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert Message */
    .alert { display: none; padding: 0.85rem 1rem; border-radius: var(--radius); font-size: 14px; font-weight: 500; margin-bottom: 1.5rem; background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(200, 85, 85, 0.3); }
    .alert.show { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* Footer */
    .universal-footer {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      font-weight: 500;
      color: #8B7B6F; /* text-dim fallback */
      font-family: var(--font-inter);
      z-index: 100;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .universal-footer:hover { opacity: 1; }
    @media (max-width: 768px) {
      .universal-footer { bottom: 14px; right: 14px; font-size: 10.5px; }
    }
    @media (max-width: 480px) {
      .universal-footer { bottom: 12px; right: 12px; font-size: 10px; }
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <img src="ipu.jpg" alt="Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'56\' height=\'56\'><rect width=\'56\' height=\'56\' fill=\'%238B1A1A\'/></svg>'">
        </div>
        <h1>E-Student Cell</h1>
        <p>Sign in to your account</p>
      </div>

      <!-- ADDED: type="button" so they don't accidentally try to "submit" a form -->
      <div class="role-toggle">
        <button type="button" id="tab-student" class="role-btn active" data-role="student" aria-label="Student Login">Student</button>
        <button type="button" id="tab-admin" class="role-btn" data-role="admin" aria-label="Admin Login">Admin</button>
      </div>

      <div id="alertBox" class="alert" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username" id="usernameLabel">Enrollment Number</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="form-input" placeholder="e.g., 05919051924" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
            <button type="button" class="pwd-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <!-- Eye Icon -->
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <!-- Eye Off (hidden by default) -->
              <svg id="eyeOffIcon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-pwd">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="spinner"></span>
          <span id="btnText">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <footer class="universal-footer">Made by IoSC & AWS EDC | Support: <a href="mailto:iosc.aws@gmail.com" style="text-decoration: underline;">iosc.aws@gmail.com</a></footer>

  <script src="js/login.js"></script>
</body>
</html>
