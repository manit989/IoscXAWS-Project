<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="ipu.jpg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password - E-Student Cell</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-3) 100%);
    }

    .change-password-container {
      width: 100%;
      max-width: 450px;
      padding: 2rem;
    }

    .change-password-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: 0 4px 12px rgba(28, 26, 26, 0.08);
    }

    .change-password-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .change-password-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .change-password-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.6;
    }

    .info-box {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--accent);
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pwd-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pwd-toggle:hover {
      color: var(--accent);
    }

    .pwd-toggle svg {
      width: 20px;
      height: 20px;
    }

    .password-strength {
      font-size: 12px;
      margin-top: 0.5rem;
      height: 20px;
    }

    .strength-meter {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.25rem;
    }

    .strength-bar {
      height: 100%;
      width: 0;
      transition: all 0.3s;
    }

    .strength-bar.weak {
      background: var(--danger);
      width: 33%;
    }

    .strength-bar.fair {
      background: var(--accent-secondary);
      width: 66%;
    }

    .strength-bar.strong {
      background: var(--success);
      width: 100%;
    }

    .strength-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 26, 26, 0.2);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .alert-success {
      background: var(--success-dim);
      color: var(--success);
      border: 1px solid var(--success);
    }

    @media (max-width: 600px) {
      .change-password-card {
        padding: 1.5rem;
      }

      .change-password-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="change-password-container">
    <div class="change-password-card">
      <div class="change-password-header">
        <h1 class="change-password-title">Change Password</h1>
        <p class="change-password-subtitle">You must change your password on first login</p>
      </div>

      <div class="info-box">
        ℹ️ Your account was created with a preset password for security reasons. Please create a new secure password now.
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="changePasswordForm" onsubmit="submitChangePassword(event)">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              class="form-input" 
              id="currentPassword" 
              placeholder="Enter your current password" 
              required 
            />
            <button type="button" class="pwd-toggle" onclick="togglePasswordVisibility('currentPassword', 'eyeCurrent', 'eyeOffCurrent')" aria-label="Toggle password visibility">
              <svg id="eyeCurrent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeOffCurrent" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              class="form-input" 
              id="newPassword" 
              placeholder="Enter new password" 
              onkeyup="checkPasswordStrength(this.value)"
              required 
            />
            <button type="button" class="pwd-toggle" onclick="togglePasswordVisibility('newPassword', 'eyeNew', 'eyeOffNew')" aria-label="Toggle password visibility">
              <svg id="eyeNew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeOffNew" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div class="password-strength">
            <div class="strength-meter">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText">Password strength: -</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              class="form-input" 
              id="confirmPassword" 
              placeholder="Confirm new password" 
              required 
            />
            <button type="button" class="pwd-toggle" onclick="togglePasswordVisibility('confirmPassword', 'eyeConfirm', 'eyeOffConfirm')" aria-label="Toggle password visibility">
              <svg id="eyeConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeOffConfirm" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Profile Photograph</label>
          <input 
            type="file" 
            class="form-input" 
            id="studentPhoto" 
            accept="image/*"
            required 
          />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Change Password & Upload Photo
        </button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem; font-size: 12px;">
        <a href="login.html" style="color: var(--accent); text-decoration: none;">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="js/change-password.js"></script>
</body>
</html>
